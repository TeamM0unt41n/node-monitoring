          env: "vuln2"

      - targets:
          - "10.2.1.103:9100"
        labels:
          env: "vuln3"

      - targets:
          - "10.2.1.104:9100"   # Host D
        labels:
          env: "tooling1"

      - targets:
          - "10.2.1.105:9100"   # Host D
        labels:
